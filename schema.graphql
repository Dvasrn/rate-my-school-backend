scalar Date

type Query {
  getAllRating: [rating!]!
  getAllSchool: [School!]!
  getAllUser: [user!]!
  getOneTeacher(id: ID!): teacher!
  getOneUser(id: ID!): user!
  getSchoolsRating(schoolId: ID!): [rating!]!
  getTeacherRatings(teacherId: ID!): [teacherRating!]!
  getTeachersBySchool(schoolId: ID!): [teacher!]!
  getUserRating(id: ID!): [rating!]!
}

type Mutation {
  addRating(input: ratingInput!): rating!
  addSchool(input: schoolInfoInput!): School!
  addSchoolPhoto(input: addSchoolPhotoInput!): School!
  addTeacher(input: addTeacherInput!): teacher!
  addTeacherRating(input: teacherRatingInput!): teacherRating!
  choosingSchool(input: choosingSchoolInput!): user!
  deleteRating(_id: ID!): rating!
  editRating(input: ratingInput!): rating!
  editUser(input: editUserInput!): user!
  login(input: loginInput!): user!
  removeSchoolPhoto(input: removeSchoolPhotoInput!): School!
  signIn(input: userInput!): user!
  toggleFavoriteSchool(input: toggleFavoriteInput!): user!
}

type School {
  _id: ID!
  isSchoolPrivate: Boolean!
  location: String!
  photos: [String!]!
  schoolName: String!
  schoolType: SchoolType!
}

enum SchoolType {
  Collage
  HighSchool
  University
}

type user {
  _id: ID!
  birthDate: String!
  favoriteSchoolIds: [String!]!
  password: String!
  phoneNumber: Int!
  schools: [usersSchool]
  username: String!
}

type usersSchool {
  enrolledAt: String!
  graduated: Boolean!
  graduatedAt: String!
  schoolId: String!
}

type rating {
  _id: ID!
  comment: String!
  schoolId: String!
  scores: scores!
  userId: String!
}

type scores {
  activetyOutsideOfSchool: Int!
  food: Int!
  location: Int!
  reputation: Int!
  sportHall: Int!
  teachers: Int!
}

input ratingInput {
  comment: String!
  schoolId: String!
  scores: scoresInput!
  userId: String!
}

input scoresInput {
  activetyOutsideOfSchool: Int!
  food: Int!
  location: Int!
  reputation: Int!
  sportHall: Int!
  teachers: Int!
}

input schoolInfoInput {
  isSchoolPrivate: Boolean!
  location: String!
  schoolName: String!
  schoolType: SchoolType
}

type teacher {
  _id: ID!
  name: String!
  schoolId: String!
  subject: String!
}

type teacherRating {
  _id: ID!
  comment: String!
  scores: teacherScores!
  teacherId: String!
  userId: String!
}

type teacherScores {
  communication: Int!
  examDifficulty: Int!
  teachingMethod: Int!
}

input addTeacherInput {
  name: String!
  schoolId: String!
  subject: String!
}

input teacherRatingInput {
  comment: String!
  scores: teacherScoresInput!
  teacherId: String!
  userId: String!
}

input teacherScoresInput {
  communication: Int!
  examDifficulty: Int!
  teachingMethod: Int!
}

input addSchoolPhotoInput {
  photoBase64: String!
  schoolId: ID!
}

input removeSchoolPhotoInput {
  photoIndex: Int!
  schoolId: ID!
}

input toggleFavoriteInput {
  schoolId: ID!
  userId: ID!
}

input choosingSchoolInput {
  enrolledAt: String!
  graduated: Boolean!
  graduatedAt: String
  schoolId: String!
  userId: String!
}

input editUserInput {
  phoneNumber: Int!
  userId: ID!
  username: String!
}

input loginInput {
  password: String!
  phoneNumber: Int!
}

input userInput {
  birthDate: String
  password: String!
  phoneNumber: Int!
  username: String!
}
